name: Build and Release Cross-Platform

permissions:
  contents: write # Required to create a release and upload assets

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    # Only run if the commit message contains "Release v"
    if: contains(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Windows zip
        run: |
          zip -r SnippingLens-Windows.zip \
            create_lnk.vbs \
            setup_win.vbs \
            readme.md \
            bin/win/ \
            etc/ \
            int/ \
            logs/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: SnippingLens-Windows.zip

  build-linux:
    # Only run if the commit message contains "Release v"
    if: contains(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Linux zip
        run: |
          zip -r SnippingLens-Linux.zip \
            setup_linux.sh \
            readme.md \
            bin/linux/ \
            int/ \
            logs/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: SnippingLens-Linux.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract release info from commit message
        id: extract_release_info
        shell: bash
        run: |
          # Get the latest commit message
          commit_msg=$(git log -1 --pretty=%B)
          echo "Commit message:"
          echo "$commit_msg"

          # Extract the version (matches digits and optional dash/letters)
          version=$(echo "$commit_msg" | sed -n 's/.*Release v\([[:alnum:].\-]\+\).*/\1/p')

          # Extract the description between the tilde markers.
          # This assumes the description is enclosed between lines containing only '~'
          description=$(echo "$commit_msg" | sed -n '/^~$/,/^~$/p' | sed '1d;$d')

          # Ensure a valid version was found
          if [ -z "$version" ]; then
            echo "No valid release version found in the commit message. Exiting."
            exit 1
          fi

          # Determine if it's a pre-release (if version contains a dash)
          if echo "$version" | grep -q '-'; then
            prerelease=true
          else
            prerelease=false
          fi

          echo "Version: $version"
          echo "Description: $description"
          echo "Prerelease: $prerelease"

          # Set outputs using the environment file method.
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "description<<EOF" >> $GITHUB_OUTPUT
          echo "$description" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.extract_release_info.outputs.version }}
          release_name: "v${{ steps.extract_release_info.outputs.version }}"
          body: |
            ${{ steps.extract_release_info.outputs.description }}

            ## Downloads

            ### Windows
            - **SnippingLens-Windows.zip** - Extract and run `setup_win.vbs`

            ### Linux
            - **SnippingLens-Linux.zip** - Extract and run `./setup_linux.sh`

            ## Installation Instructions

            ### Windows
            1. Download and extract `SnippingLens-Windows.zip`.
            2. Run `setup_win.vbs` to start the application.
            3. Optionally run `create_lnk.vbs` to create a desktop shortcut.

            ### Linux
            1. Download and extract `SnippingLens-Linux.zip`.
            2. Run `./setup_linux.sh` — it will check dependencies, set up the environment, and start the app.
            3. Use the config window (tray > Open App) to enable Startup and App Menu entries.
          draft: false
          prerelease: ${{ steps.extract_release_info.outputs.prerelease }}

      - name: Upload Windows Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: "./windows-zip/SnippingLens-Windows.zip"
          asset_name: SnippingLens-Windows.zip
          asset_content_type: application/zip

      - name: Upload Linux Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: "./linux-zip/SnippingLens-Linux.zip"
          asset_name: SnippingLens-Linux.zip
          asset_content_type: application/zip
